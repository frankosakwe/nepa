
upstream blue_backend {
    server api-gateway-blue:3000; # Points to the blue container
    keepalive 32;
}

upstream green_backend {
    server api-gateway-green:3000; # Points to the green container
    keepalive 32;
}

# Map to determine which upstream to use
# Priority:
# 1. Cookie "x-deploy-version" (for testing)
# 2. Header "x-deploy-version" (for testing/monitoring)
# 3. Default variable (switched during deployment)
map $http_x_deploy_version $upstream_version_header {
    default "";
    "blue"  blue_backend;
    "green" green_backend;
}

map $cookie_x_deploy_version $upstream_version_cookie {
    default "";
    "blue"  blue_backend;
    "green" green_backend;
}

# The active version is controlled by this file.
# During deployment, we update the default value here.
map $host $active_upstream {
    default blue_backend; 
}

# Final upstream decision logic
map $upstream_version_header$upstream_version_cookie $final_upstream {
    default $active_upstream;
    "~blue_backend" blue_backend;
    "~green_backend" green_backend;
}

server {
    listen 80;
    server_name localhost;

    # Health check for the load balancer itself
    location /health {
        return 200 '{"status":"UP", "active":"$active_upstream"}';
        add_header Content-Type application/json;
    }

    location / {
        # Proxy to the determined upstream
        proxy_pass http://$final_upstream;
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pass the version header for debugging
        add_header X-Upstream-Version $final_upstream always;
    }
}
